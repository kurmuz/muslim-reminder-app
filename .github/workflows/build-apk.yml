name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Patch expo-font
        run: |
          cp patches/expo-font-build.gradle node_modules/expo-font/android/build.gradle
          cp patches/FontLoaderModule.kt node_modules/expo-font/android/src/main/java/expo/modules/font/FontLoaderModule.kt
          cp patches/FontUtilsRecords.kt node_modules/expo-font/android/src/main/java/expo/modules/font/FontUtilsRecords.kt

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Generate debug keystore
        run: keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK (debug)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muslim-reminder-apk
          path: android/app/build/outputs/apk/debug/*.apk
