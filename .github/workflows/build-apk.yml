name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Patch expo-font build.gradle
        run: |
          python3 -c "
import re
with open('node_modules/expo-font/android/build.gradle') as f:
    content = f.read()
content = re.sub(
    r\"plugins \{.*?['\"]expo-module-gradle-plugin['\"].*?\}\",
    \"apply plugin: 'com.android.library'\\n\" +
    \"apply from: new File(project(':expo-modules-core').projectDir.absolutePath, 'ExpoModulesCorePlugin.gradle')\\n\" +
    \"applyKotlinExpoModulesCorePlugin()\\n\" +
    \"useCoreDependencies()\\n\" +
    \"useDefaultAndroidSdkVersions()\\n\" +
    \"useExpoPublishing()\",
    content,
    flags=re.DOTALL
)
with open('node_modules/expo-font/android/build.gradle', 'w') as f:
    f.write(content)
print('Patched expo-font/build.gradle')
"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muslim-reminder-apk
          path: android/app/build/outputs/apk/release/*.apk
